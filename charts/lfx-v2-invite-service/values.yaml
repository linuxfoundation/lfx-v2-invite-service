replicaCount: 1

image:
  repository: ghcr.io/linuxfoundation/lfx-v2-invite-service
  pullPolicy: IfNotPresent
  tag: ""

env:
  NATS_URL: "nats://lfx-platform-nats.lfx.svc.cluster.local:4222"
  LFX_BASE_URL: "https://lfx.linuxfoundation.org"
  LOG_LEVEL: "info"

nats:
  stream_invite_requests:
    creation: true
    keep: true
    name: invite-requests
    subjects:
      - lfx.invite-service.send_invite
    storage: file
    retention: limits
    maxAge: 24h
    maxBytes: "104857600"
    maxMsgs: "100000"
    replicas: 1
    compression: s2
