---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Chart.Name }}
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Chart.Name }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        app: {{ .Chart.Name }}
        app.kubernetes.io/name: {{ .Chart.Name }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: app
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: NATS_URL
              value: {{ .Values.nats.url }}
            - name: LFX_SELF_SERVE_BASE_URL
              value: {{ .Values.app.selfServeBaseURL | quote }}
            - name: DEFAULT_INVITE_LINK_RETURN_URL
              value: {{ .Values.app.defaultReturnURL | quote }}
            {{- $allowedHosts := .Values.app.allowedReturnURLHosts | toString | trim }}
            {{- if ne $allowedHosts "" }}
            - name: ALLOWED_RETURN_URL_HOSTS
              value: {{ $allowedHosts | quote }}
            {{- end }}
            {{- if .Values.app.jwtSecretName }}
            - name: INVITE_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.app.jwtSecretName }}
                  key: invite-jwt-secret
                  optional: false
            {{- end }}
            - name: INVITES_KV_BUCKET
              value: {{ .Values.nats.kv_bucket_invites.name | quote }}
            - name: LOG_LEVEL
              value: {{ .Values.app.logLevel }}
            {{- with .Values.app.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
            {{- $otelServiceName := .Values.app.otel.serviceName | toString | trim }}
            {{- if ne $otelServiceName "" }}
            - name: OTEL_SERVICE_NAME
              value: {{ $otelServiceName | quote }}
            {{- end }}
            {{- $otelServiceVersion := .Values.app.otel.serviceVersion | toString | trim }}
            {{- if ne $otelServiceVersion "" }}
            - name: OTEL_SERVICE_VERSION
              value: {{ $otelServiceVersion | quote }}
            {{- end }}
            {{- $otelEndpoint := .Values.app.otel.endpoint | toString | trim }}
            {{- if ne $otelEndpoint "" }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ $otelEndpoint | quote }}
            {{- end }}
            {{- $otelProtocol := .Values.app.otel.protocol | toString | trim }}
            {{- if ne $otelProtocol "" }}
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: {{ $otelProtocol | quote }}
            {{- end }}
            {{- $otelInsecure := .Values.app.otel.insecure | toString | trim }}
            {{- if ne $otelInsecure "" }}
            - name: OTEL_EXPORTER_OTLP_INSECURE
              value: {{ $otelInsecure | quote }}
            {{- end }}
            {{- $otelTracesExporter := .Values.app.otel.tracesExporter | toString | trim }}
            {{- if ne $otelTracesExporter "" }}
            - name: OTEL_TRACES_EXPORTER
              value: {{ $otelTracesExporter | quote }}
            {{- end }}
            {{- $otelTracesSampler := .Values.app.otel.tracesSampler | toString | trim }}
            {{- if ne $otelTracesSampler "" }}
            - name: OTEL_TRACES_SAMPLER
              value: {{ $otelTracesSampler | quote }}
            {{- end }}
            {{- $otelTracesSamplerArg := .Values.app.otel.tracesSamplerArg | toString | trim }}
            {{- if ne $otelTracesSamplerArg "" }}
            - name: OTEL_TRACES_SAMPLER_ARG
              value: {{ $otelTracesSamplerArg | quote }}
            {{- end }}
            {{- $otelMetricsExporter := .Values.app.otel.metricsExporter | toString | trim }}
            {{- if ne $otelMetricsExporter "" }}
            - name: OTEL_METRICS_EXPORTER
              value: {{ $otelMetricsExporter | quote }}
            {{- end }}
            {{- $otelLogsExporter := .Values.app.otel.logsExporter | toString | trim }}
            {{- if ne $otelLogsExporter "" }}
            - name: OTEL_LOGS_EXPORTER
              value: {{ $otelLogsExporter | quote }}
            {{- end }}
            {{- $otelPropagators := .Values.app.otel.propagators | toString | trim }}
            {{- if ne $otelPropagators "" }}
            - name: OTEL_PROPAGATORS
              value: {{ $otelPropagators | quote }}
            {{- end }}
          # livenessProbe and readinessProbe are omitted — the service has no HTTP server yet.
          # Add probes here once the HTTP API is introduced.
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
